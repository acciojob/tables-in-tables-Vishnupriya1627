<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <table style="width: 100%; height: 100%;border:1px solid black">
      <!-- Your code here -->
		<tr>
			<td style="border:1px solid black">
				<table style="border:1px solid black">
					<tr>
						<th style="border:1px solid black" colspan="2"> Nested Table 2</th>
					</tr>
					<tr>
						<th style="border:1px solid black">Column 1</th>
						<th style="border:1px solid black">Column 2</th>
					</tr>
					<tr>
						<td style="border:1px solid black">abc</td>
						<td style="border:1px solid black">def</td>
					</tr>
				</table>
			</td>
			<td style="border:1px solid black">
				<table style="border:1px solid black">
					<tr style="border:1px solid black">
						<th style="border:1px solid black">Nested Table 1</th>
					</tr>
					<tr>
						<td style="border:1px solid black">
							<ul>
								<li>List item 1</li>
								<li>List item 2</li>
								<li>List item 3</li>
							</ul>
						</td>
					</tr>
				</table>
			</td>
		</tr>
		<tr style="border:1px solid black">
			<td style="border:1px solid black">
				<table style="border:1px solid black">
					<tr style="border:1px solid black">
						<th style="border:1px solid black" colspan="2">Nested Table 3</th>
					</tr>
					<tr style="border:1px solid black">
						<td style="border:1px solid black"><a href="google.com">Nested Table</a></td>
						<td style="border:1px solid black">Demo Continued</td>	
					</tr>
				</table>
			</td>
			<td style="border:1px solid black">
				<table style="border:1px solid black">
					<tr style="border:1px solid black">
						<th style="border:1px solid black">Nested Table 4</th>
					</tr>
					<tr style="border:1px solid black">
						<td style="border:1px solid black;background-color:black;color:white">HTML</td>
					</tr>
				</table>
			</td>
		</tr>
    </table>
  </body>
</html>
